version: '3.8'

services:
  #1. Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-broker
    networks:
      - thesis-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 4G
        reservations:
          cpus: '1.5'
          memory: 4G

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    networks:
      - thesis-net
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic invoice_issued --partitions 1 --replication-factor 1"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 256M

  #2. vMODB & Sidecar Emitter
  vmodb-proxy:
    build: { context: ./vMODB/marketplace/proxy, dockerfile: Dockerfile }
    container_name: vmodb-proxy
    networks:
      - thesis-net
    ports:
      - "8091:8091"
    volumes:
      - vmodb-shared-space:/tmp
      - vmodb-shared-space:/root/vms
    depends_on:
      vmodb-cart:
        condition: service_started
      vmodb-order:
        condition: service_started
      vmodb-product:
        condition: service_started
      vmodb-stock:
        condition: service_started
      vmodb-shipment:
        condition: service_started
      vmodb-customer:
        condition: service_started
      vmodb-payment:
        condition: service_started
      vmodb-seller:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 1G

  vmodb-cart:
    build: { context: ./vMODB/marketplace/cart, dockerfile: Dockerfile }
    container_name: vmodb-cart
    networks:
      - thesis-net
    ports:
      - "8080:8080"
    volumes: [ "vmodb-shared-space:/tmp" ]
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 512M

  cart-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    restart: on-failure
    environment: [ "VMS_ID=cart", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      vmodb-cart:
        condition: service_started
      kafka:
        condition: service_healthy

  vmodb-order:
    build: { context: ./vMODB/marketplace/order, dockerfile: Dockerfile }
    container_name: vmodb-order
    networks:
      - thesis-net
    ports:
      - "8081:8081"
    volumes: [ "vmodb-shared-space:/tmp" ]
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 512M

  order-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    restart: on-failure
    environment: [ "VMS_ID=order", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      vmodb-order:
        condition: service_started
      kafka:
        condition: service_healthy

  vmodb-customer:
    build: { context: ./vMODB/marketplace/customer, dockerfile: Dockerfile }
    container_name: vmodb-customer
    networks:
      - thesis-net
    volumes: [ "vmodb-shared-space:/tmp" ]
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 512M

  customer-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    restart: on-failure
    environment: [ "VMS_ID=customer", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      vmodb-customer:
        condition: service_started
      kafka:
        condition: service_healthy

  vmodb-payment:
    build: { context: ./vMODB/marketplace/payment, dockerfile: Dockerfile }
    container_name: vmodb-payment
    networks:
      - thesis-net
    volumes: [ "vmodb-shared-space:/tmp" ]
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 512M

  payment-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    restart: on-failure
    environment: [ "VMS_ID=payment", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      vmodb-payment:
        condition: service_started
      kafka:
        condition: service_healthy

  vmodb-seller:
    build: { context: ./vMODB/marketplace/seller, dockerfile: Dockerfile }
    container_name: vmodb-seller
    networks:
      - thesis-net
    volumes: [ "vmodb-shared-space:/tmp" ]
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 512M

  seller-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    restart: on-failure
    environment: [ "VMS_ID=seller", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      vmodb-seller:
        condition: service_started
      kafka:
        condition: service_healthy

  vmodb-product:
    build: { context: ./vMODB/marketplace/product, dockerfile: Dockerfile }
    container_name: vmodb-product
    networks:
      - thesis-net
    ports:
      - "8083:8083"
    volumes: [ "vmodb-shared-space:/tmp" ]
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 512M

  product-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    restart: on-failure
    environment: [ "VMS_ID=product", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      vmodb-product:
        condition: service_started
      kafka:
        condition: service_healthy

  vmodb-shipment:
    build: { context: ./vMODB/marketplace/shipment, dockerfile: Dockerfile }
    container_name: vmodb-shipment
    networks:
      - thesis-net
    volumes: [ "vmodb-shared-space:/tmp" ]
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 512M

  shipment-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    restart: on-failure
    environment: [ "VMS_ID=shipment", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      vmodb-shipment:
        condition: service_started
      kafka:
        condition: service_healthy

  vmodb-stock:
    build: { context: ./vMODB/marketplace/stock, dockerfile: Dockerfile }
    container_name: vmodb-stock
    networks:
      - thesis-net
    ports:
      - "8082:8082"
    volumes: [ "vmodb-shared-space:/tmp" ]
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 512M

  stock-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    restart: on-failure
    environment: [ "VMS_ID=stock", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      vmodb-stock:
        condition: service_started
      kafka:
        condition: service_healthy

  #3. ShimLayer
  shim-layer:
    build: ./ShimLayer
    networks:
      - thesis-net
    restart: on-failure
    entrypoint: [ "java", "-jar", "app.jar" ]
    environment:
      - KAFKA_SERVERS=kafka:9092
    depends_on:
      seller-ms:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./MarketplaceOnDapr:/MarketplaceOnDapr

  #4. External Microservice：C# + Dapr
  seller-ms:
    build: { context: ./MarketplaceOnDapr, dockerfile: ./SellerMS/Dockerfile }
    networks:
      - thesis-net
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_URLS=http://+:5004
      - ASPNETCORE_HTTP_PORTS=5004
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 2G

  seller-dapr:
    image: "daprio/daprd:latest"
    command: [ "./daprd", "-app-id", "seller", "-app-port", "5004", "-dapr-http-port", "3504", "-resources-path", "/components" ]
    volumes: [ "./MarketplaceOnDapr/DaprConfig:/components" ]
    networks:
      - thesis-net
    depends_on: [ seller-ms ]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 512M

volumes:
  vmodb-shared-space:

networks:
  thesis-net:
    driver: bridge