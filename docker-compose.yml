services:

  # =========================================================
  # Proxy
  # =========================================================
  vmodb-proxy:
    build:
      context: ./vMODB/marketplace/proxy
      dockerfile: Dockerfile
    container_name: vmodb-proxy
    networks:
      - thesis-net
    ports:
      - "8091:8091"
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "8085:8085"
      - "8087:8087"
    volumes:
      - vmodb-shared-space:/tmp
      - vmodb-vms:/root/vms

  # =========================================================
  # Kafka (FIXED KRaft SINGLE NODE)
  # =========================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-broker
    networks:
      - thesis-net
    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # ✅ ONLY INTERNAL (NO EXTERNAL)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092"]
      interval: 10s
      timeout: 10s
      retries: 15

    restart: unless-stopped

  # =========================================================
  # Topic init
  # =========================================================
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    networks:
      - thesis-net
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic invoice_issued \
          --partitions 1 \
          --replication-factor 1

  # =========================================================
  # EMITTERS (FIXED)
  # =========================================================

  cart-emitter:
    build: ./vMODB/sidecar-emitter
    container_name: cart-emitter
    networks: [thesis-net]
    environment:
      VMS_ID: cart
      VMS_LOG_BASE_DIR: /tmp
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - vmodb-shared-space:/tmp
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  order-emitter:
    build: ./vMODB/sidecar-emitter
    container_name: order-emitter
    networks: [thesis-net]
    environment:
      VMS_ID: order
      VMS_LOG_BASE_DIR: /tmp
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - vmodb-shared-space:/tmp
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  stock-emitter:
    build: ./vMODB/sidecar-emitter
    container_name: stock-emitter
    networks: [thesis-net]
    environment:
      VMS_ID: stock
      VMS_LOG_BASE_DIR: /tmp
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - vmodb-shared-space:/tmp
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  product-emitter:
    build: ./vMODB/sidecar-emitter
    container_name: product-emitter
    networks: [thesis-net]
    environment:
      VMS_ID: product
      VMS_LOG_BASE_DIR: /tmp
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - vmodb-shared-space:/tmp
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  seller-emitter:
    build: ./vMODB/sidecar-emitter
    container_name: seller-emitter
    networks: [thesis-net]
    environment:
      VMS_ID: seller
      VMS_LOG_BASE_DIR: /tmp
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - vmodb-shared-space:/tmp
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  shipment-emitter:
    build: ./vMODB/sidecar-emitter
    container_name: shipment-emitter
    networks: [thesis-net]
    environment:
      VMS_ID: shipment
      VMS_LOG_BASE_DIR: /tmp
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - vmodb-shared-space:/tmp
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # =========================================================
  # MARKETPLACE (unchanged structure)
  # =========================================================
  vmodb-cart:
    build: ./vMODB/marketplace/cart
    container_name: vmodb-cart
    environment:
      - VMS_ID=cart
      - VMS_LOG_BASE_DIR=/tmp
    network_mode: service:vmodb-proxy
    volumes:
      - vmodb-shared-space:/tmp

  vmodb-order:
    build: ./vMODB/marketplace/order
    container_name: vmodb-order
    environment:
      - VMS_ID=order
      - VMS_LOG_BASE_DIR=/tmp
    network_mode: service:vmodb-proxy
    volumes:
      - vmodb-shared-space:/tmp

  vmodb-stock:
    build: ./vMODB/marketplace/stock
    container_name: vmodb-stock
    environment:
      - VMS_ID=stock
      - VMS_LOG_BASE_DIR=/tmp
    network_mode: service:vmodb-proxy
    volumes:
      - vmodb-shared-space:/tmp

  vmodb-product:
    build: ./vMODB/marketplace/product
    container_name: vmodb-product
    environment:
      - VMS_ID=product
      - VMS_LOG_BASE_DIR=/tmp
    network_mode: service:vmodb-proxy
    volumes:
      - vmodb-shared-space:/tmp

  vmodb-customer:
    build: ./vMODB/marketplace/customer
    container_name: vmodb-customer
    environment:
      - VMS_ID=customer
      - VMS_LOG_BASE_DIR=/tmp
    network_mode: service:vmodb-proxy
    volumes:
      - vmodb-shared-space:/tmp

  vmodb-payment:
    build: ./vMODB/marketplace/payment
    container_name: vmodb-payment
    environment:
      - VMS_ID=payment
      - VMS_LOG_BASE_DIR=/tmp
    network_mode: service:vmodb-proxy
    volumes:
      - vmodb-shared-space:/tmp

  vmodb-seller:
    build: ./vMODB/marketplace/seller
    container_name: vmodb-seller
    environment:
      - VMS_ID=seller
      - VMS_LOG_BASE_DIR=/tmp
    network_mode: service:vmodb-proxy
    volumes:
      - vmodb-shared-space:/tmp

  vmodb-shipment:
    build: ./vMODB/marketplace/shipment
    container_name: vmodb-shipment
    environment:
      - VMS_ID=shipment
      - VMS_LOG_BASE_DIR=/tmp
    network_mode: service:vmodb-proxy
    volumes:
      - vmodb-shared-space:/tmp
  seller-ms:
    build:
      context: ./MarketplaceOnDapr
      dockerfile: ./SellerMS/Dockerfile
    container_name: seller-ms
    networks:
      - thesis-net
    ports:
      - "5006:5006"
    environment:
      - ASPNETCORE_URLS=http://+:5006
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped


  seller-dapr:
    image: "daprio/daprd:1.11.2"
    container_name: seller-dapr
    command: [
      "./daprd",
      "-app-id", "seller",
      "-app-port", "5006",
      "-dapr-http-port", "3506",
      "-app-protocol", "http",
      "-app-channel-address", "seller-ms",
      "-resources-path", "/components"
    ]
    volumes:
      - ./MarketplaceOnDapr/DaprConfig:/components
    networks:
      - thesis-net
    ports:
      - "3506:3506"
    depends_on:
      - seller-ms
    restart: unless-stopped

  # ShimLayer
  shim-layer:
    build:
      context: ./ShimLayer
      dockerfile: Dockerfile
    # image: openjdk:17-slim
    # working_dir: /app
    # entrypoint: ["java", "-jar", "ShimLayer-1.0-SNAPSHOT.jar"]
    container_name: shim-layer
    networks:
      - thesis-net
    environment:
      - KAFKA_SERVERS=kafka:9092
      - DAPR_HTTP_URL=http://seller-dapr:3506
    volumes:
      - ./ShimLayer/target:/app
      - ./MarketplaceOnDapr:/MarketplaceOnDapr
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      seller-dapr:
        condition: service_started
    restart: unless-stopped

volumes:
  vmodb-shared-space:
  vmodb-vms:

networks:
  thesis-net:
    name: thesis-net
    driver: bridge