version: '3.8'

services:
  # 1. Kafka 基础设施
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-broker
    networks:
      - thesis-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 3s
      timeout: 20s
      retries: 45

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    networks:
      - thesis-net
    depends_on:
      kafka: { condition: service_healthy }
    command: >
      bash -c "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic invoice_issued --partitions 1 --replication-factor 1 &&
               kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic cart --partitions 1 --replication-factor 1 &&
               kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order --partitions 1 --replication-factor 1 &&
               kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic stock --partitions 1 --replication-factor 1 &&
               kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic seller --partitions 1 --replication-factor 1"

  # 2. vMODB 大总管平面
  vmodb-proxy:
    build: { context: ./vMODB/marketplace/proxy, dockerfile: Dockerfile }
    container_name: vmodb-proxy
    networks:
      - thesis-net
    ports:
      - "8091:8091"
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "8085:8085"
      - "8087:8087"
    restart: on-failure
    volumes:
      - vmodb-shared-space:/tmp
      - vmodb-shared-space:/root/vms

  # 3. vMODB 子数据库平面
  vmodb-cart:
    build: { context: ./vMODB/marketplace/cart, dockerfile: Dockerfile }
    container_name: vmodb-cart
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-order:
    build: { context: ./vMODB/marketplace/order, dockerfile: Dockerfile }
    container_name: vmodb-order
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-stock:
    build: { context: ./vMODB/marketplace/stock, dockerfile: Dockerfile }
    container_name: vmodb-stock
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-product:
    build: { context: ./vMODB/marketplace/product, dockerfile: Dockerfile }
    container_name: vmodb-product
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-customer:
    build: { context: ./vMODB/marketplace/customer, dockerfile: Dockerfile }
    container_name: vmodb-customer
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-payment:
    build: { context: ./vMODB/marketplace/payment, dockerfile: Dockerfile }
    container_name: vmodb-payment
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-seller:
    build: { context: ./vMODB/marketplace/seller, dockerfile: Dockerfile }
    container_name: vmodb-seller
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-shipment:
    build: { context: ./vMODB/marketplace/shipment, dockerfile: Dockerfile }
    container_name: vmodb-shipment
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  # 4. Sidecar Emitters (🌟 绝杀错峰：第一次如果撞击 Kafka 超时摔倒了，Docker 会强制等 15 秒再拉起它们！这时候 Kafka 早就稳定了！)
  cart-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks: [ - thesis-net ]
    deploy:
      restart_policy: { condition: on-failure, delay: 15s }
    environment: [ "VMS_ID=cart", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on: { kafka-init: { condition: service_completed_successfully } }

  order-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks: [ - thesis-net ]
    deploy:
      restart_policy: { condition: on-failure, delay: 15s }
    environment: [ "VMS_ID=order", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on: { kafka-init: { condition: service_completed_successfully } }

  customer-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks: [ - thesis-net ]
    deploy:
      restart_policy: { condition: on-failure, delay: 15s }
    environment: [ "VMS_ID=customer", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on: { kafka-init: { condition: service_completed_successfully } }

  payment-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks: [ - thesis-net ]
    deploy:
      restart_policy: { condition: on-failure, delay: 15s }
    environment: [ "VMS_ID=payment", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on: { kafka-init: { condition: service_completed_successfully } }

  seller-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks: [ - thesis-net ]
    deploy:
      restart_policy: { condition: on-failure, delay: 15s }
    environment: [ "VMS_ID=seller", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on: { kafka-init: { condition: service_completed_successfully } }

  product-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks: [ - thesis-net ]
    deploy:
      restart_policy: { condition: on-failure, delay: 15s }
    environment: [ "VMS_ID=product", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on: { kafka-init: { condition: service_completed_successfully } }

  shipment-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks: [ - thesis-net ]
    deploy:
      restart_policy: { condition: on-failure, delay: 15s }
    environment: [ "VMS_ID=shipment", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on: { kafka-init: { condition: service_completed_successfully } }

  stock-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks: [ - thesis-net ]
    deploy:
      restart_policy: { condition: on-failure, delay: 15s }
    environment: [ "VMS_ID=stock", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on: { kafka-init: { condition: service_completed_successfully } }

  # 5. ShimLayer 与 C# Dapr 外部服务
  # 🌟 终极自愈：由于 C# 编译需要时间，允许 shim-layer 失败复活 50 次，直到全线通电！
  shim-layer:
    build: ./ShimLayer
    networks:
      - thesis-net
    entrypoint: [ "java", "-jar", "app.jar" ]
    environment:
      - KAFKA_SERVERS=kafka:9092
    deploy:
      restart_policy:
        condition: on-failure
        delay: 6s
        max_attempts: 50
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      seller-ms: { condition: service_started }
    volumes:
      - ./MarketplaceOnDapr:/MarketplaceOnDapr

  seller-ms:
    # 🌟 彻底回归原厂代码配置：用它原本封装完整的 Dockerfile 进行原生容器内拉起！
    build: { context: ./MarketplaceOnDapr, dockerfile: ./SellerMS/Dockerfile }
    networks:
      - thesis-net
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5004
    restart: on-failure

  seller-dapr:
    image: "daprio/daprd:latest"
    command: [ "./daprd", "-app-id", "seller", "-app-port", "5004", "-dapr-http-port", "3504", "-resources-path", "/components" ]
    volumes: [ "./MarketplaceOnDapr/DaprConfig:/components" ]
    networks:
      - thesis-net
    depends_on: [ seller-ms ]

volumes:
  vmodb-shared-space:

networks:
  thesis-net:
    driver: bridge