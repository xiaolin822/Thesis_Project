version: '3.8'

services:

  # =========================================================
  # Kafka (KRaft Single Node)
  # =========================================================

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-broker

    networks:
      - thesis-net

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: 'broker,controller'

      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'

      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'

      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092'

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'

      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'

      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 10

    restart: unless-stopped

  # =========================================================
  # Kafka Topic Init
  # =========================================================

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1

    networks:
      - thesis-net

    depends_on:
      kafka:
        condition: service_healthy

    command: >
      bash -c "
      kafka-topics \
        --bootstrap-server kafka:9092 \
        --create \
        --if-not-exists \
        --topic invoice_issued \
        --partitions 1 \
        --replication-factor 1

  # =========================================================
  # Seller Microservice (.NET)
  # =========================================================

  seller-ms:
    build:
      context: ./MarketplaceOnDapr/SellerMS
      dockerfile: Dockerfile

    container_name: seller-ms

    networks:
      - thesis-net

    ports:
      - "5004:5004"

    environment:
      ASPNETCORE_URLS: http://+:5004

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:5004 || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    restart: on-failure

  # =========================================================
  # Dapr Sidecar
  # =========================================================

  seller-dapr:
    image: daprio/daprd:latest

    container_name: seller-dapr

    command:
      [
        "./daprd",
        "-app-id", "seller",
        "-app-port", "5004",
        "-dapr-http-port", "3504",
        "-resources-path", "/components"
      ]

    volumes:
      - ./MarketplaceOnDapr/DaprConfig/components:/components

    networks:
      - thesis-net

    depends_on:
      seller-ms:
        condition: service_healthy

    restart: on-failure

  # =========================================================
  # Example Emitter
  # =========================================================

  seller-emitter:
    build:
      context: ./vMODB/sidecar-emitter
      dockerfile: Dockerfile

    container_name: seller-emitter

    networks:
      - thesis-net

    environment:
      VMS_ID: seller
      VMS_LOG_BASE_DIR: /tmp/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    volumes:
      - vmodb-shared-space:/tmp

    depends_on:
      kafka-init:
        condition: service_completed_successfully

    restart: on-failure

# =========================================================
# Volumes
# =========================================================

volumes:
  vmodb-shared-space:

# =========================================================
# Networks
# =========================================================

networks:
  thesis-net:
    driver: bridge