services:
  # 1. Kafka 基础设施
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-broker
    networks:
      - thesis-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 3s
      timeout: 20s
      retries: 45
    deploy:
      resources:
        limits: { cpus: '1.5', memory: 4G }
        reservations: { cpus: '1.5', memory: 4G }

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    networks:
      - thesis-net
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic invoice_issued --partitions 1 --replication-factor 1"

  # 2. vMODB 大总管（网络宿主底座：收拢所有内部数据库的端口平面）
  vmodb-proxy:
    build: { context: ./vMODB/marketplace/proxy, dockerfile: Dockerfile }
    container_name: vmodb-proxy
    networks:
      - thesis-net
    ports:
      - "8091:8091" # proxy 自身
      - "8080:8080" # 🌟 cart：完美对齐 8080
      - "8081:8081" # 🌟 product：完美对齐 8081
      - "8082:8082" # 🌟 stock：完美对齐 8082
      - "8083:8083" # 🌟 order：完美对齐 8083
      - "8084:8084" # 🌟 payment：完美对齐 8084
      - "8085:8085" # 🌟 shipment：完美对齐 8085
      - "8087:8087" # 🌟 seller：完美对齐 8087
    restart: on-failure
    volumes:
      - vmodb-shared-space:/tmp
      - vmodb-shared-space:/root/vms

  # 3. vMODB 子数据库（网络全部斩断依赖，直接强行注入 proxy 空间）
  vmodb-cart:
    build: { context: ./vMODB/marketplace/cart, dockerfile: Dockerfile }
    container_name: vmodb-cart
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-order:
    build: { context: ./vMODB/marketplace/order, dockerfile: Dockerfile }
    container_name: vmodb-order
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-stock:
    build: { context: ./vMODB/marketplace/stock, dockerfile: Dockerfile }
    container_name: vmodb-stock
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-product:
    build: { context: ./vMODB/marketplace/product, dockerfile: Dockerfile }
    container_name: vmodb-product
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-customer:
    build: { context: ./vMODB/marketplace/customer, dockerfile: Dockerfile }
    container_name: vmodb-customer
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-payment:
    build: { context: ./vMODB/marketplace/payment, dockerfile: Dockerfile }
    container_name: vmodb-payment
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-seller:
    build: { context: ./vMODB/marketplace/seller, dockerfile: Dockerfile }
    container_name: vmodb-seller
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  vmodb-shipment:
    build: { context: ./vMODB/marketplace/shipment, dockerfile: Dockerfile }
    container_name: vmodb-shipment
    network_mode: "service:vmodb-proxy"
    volumes: [ "vmodb-shared-space:/tmp" ]

  # 4. Sidecar Emitters
  cart-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
    environment: [ "VMS_ID=cart", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      kafka: { condition: service_healthy }

  order-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
    environment: [ "VMS_ID=order", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      kafka: { condition: service_healthy }

  customer-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
    environment: [ "VMS_ID=customer", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      kafka: { condition: service_healthy }

  payment-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
    environment: [ "VMS_ID=payment", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      kafka: { condition: service_healthy }

  seller-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
    environment: [ "VMS_ID=seller", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      kafka: { condition: service_healthy }

  product-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
    environment: [ "VMS_ID=product", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      kafka: { condition: service_healthy }

  shipment-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
    environment: [ "VMS_ID=shipment", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      kafka: { condition: service_healthy }

  stock-emitter:
    build: { context: ./vMODB/sidecar-emitter, dockerfile: Dockerfile }
    networks:
      - thesis-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
    environment: [ "VMS_ID=stock", "VMS_LOG_BASE_DIR=/tmp/", "KAFKA_BOOTSTRAP_SERVERS=kafka:9092" ]
    volumes: [ "vmodb-shared-space:/tmp" ]
    depends_on:
      kafka: { condition: service_healthy }

  # 5. ShimLayer 与 C# Dapr 外部服务
  shim-layer:
    build: ./ShimLayer
    networks:
      - thesis-net
    restart: on-failure
    entrypoint: [ "java", "-jar", "app.jar" ]
    environment:
      - KAFKA_SERVERS=kafka:9092
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      seller-ms: { condition: service_started }
      seller-dapr: { condition: service_started }
    volumes:
      - ./MarketplaceOnDapr:/MarketplaceOnDapr

  seller-ms:
    build: { context: ./MarketplaceOnDapr, dockerfile: ./SellerMS/Dockerfile }
    networks:
      - thesis-net
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_URLS=http://+:5004
      - ASPNETCORE_HTTP_PORTS=5004


  seller-dapr:
    image: "daprio/daprd:latest"
    command: [ "./daprd", "-app-id", "seller", "-app-port", "5004", "-dapr-http-port", "3504", "-resources-path", "/components" ]
    volumes: [ "./MarketplaceOnDapr/DaprConfig:/components" ]
    networks:
      - thesis-net
    depends_on: [ seller-ms ]


volumes:
  vmodb-shared-space:

networks:
  thesis-net:
    driver: bridge